<!DOCTYPE html>
<html>
<head>
    <title>Guest Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<h2>Enter Guest Details</h2>

<form method="POST">
{% csrf_token %}

Check-in:
<input type="date" name="checkin_date" required><br>

Check-out:
<input type="date" name="checkout_date" required><br>

Adults:
<input type="number" name="adults" min="1" required><br>

Children:
<input type="number" name="children" min="0" required><br>

Total Guests:
<input type="number" name="total_guests" id="total" readonly><br>

Payment:
<select name="payment_method">
    <option value="cash">Cash</option>
    <option value="card">Card</option>
    <option value="upi">UPI</option>
</select>

<button type="submit" class="btn btn-outline-primary">Continue</button>
</form>

<script>
function updateTotal(){
    let adults = parseInt(document.querySelector('[name="adults"]').value) || 0;
    let children = parseInt(document.querySelector('[name="children"]').value) || 0;
    document.getElementById("total").value = adults + children;
}

document.querySelector('[name="adults"]').addEventListener("input", updateTotal);
document.querySelector('[name="children"]').addEventListener("input", updateTotal);
</script>

</body>
</html>
{% comment %} <label>First Name</label><br>
<input type="text" required><br><br>

<label>Last Name</label><br>
<input type="text" required><br><br>

<label>Phone</label><br>
<input type="text" required><br><br>

<label>Email</label><br>
<input type="email" required><br><br>

<button type="submit">Confirm Booking</button>

</form> {% endcomment %}
