<!DOCTYPE html>
<html>
<head>
    <title>Guest Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<h2>Enter Guest Details</h2>

<form method="POST">
{% csrf_token %}

Check-in:
<input type="date" name="checkin_date"  id="checkin_date" required><br>

Check-out:
<input type="date" name="checkout_date" id="checkout_date" required><br>

<p>Maximum allowed guests: {{ room.max_guests }}</p>
Adults:
<input type="number" id="adults" name="adults" min="1" max="{{ room.max_guests }}" required><br>

Children:   
<input type="number" id="children" name="children" min="0" max="{{ room.max_guests }}" required><br>

Total Guests:
<input type="number" name="total_guests" id="total" readonly><br>

Payment:
<select name="payment_method">
    <option value="cash">Cash</option>
    <option value="card">Card</option>
    <option value="upi">UPI</option>
</select>

<button type="submit" class="btn btn-outline-primary">Continue</button>
</form>




<script>



const checkin = document.getElementById("checkin_date");
const checkout = document.getElementById("checkout_date");

// ---- Get India date ----
const indiaDate = new Date().toLocaleDateString("en-CA", {
    timeZone: "Asia/Kolkata"
});

checkin.min = indiaDate;

// ---- Update checkout when checkin changes ----
checkin.addEventListener("change", function () {
    if (!this.value) return;

    let checkinDate = new Date(this.value);
    checkinDate.setDate(checkinDate.getDate() + 1);

    let minCheckout = checkinDate.toLocaleDateString("en-CA", {
        timeZone: "Asia/Kolkata"
    });

    checkout.min = minCheckout;

    if (checkout.value && checkout.value <= this.value) {
        checkout.value = "";
    }
});

// ---- Auto total guests ----
const maxGuests = {{ room.max_guests }};

function updateTotal(){
    let adults = parseInt(document.getElementById("adults").value) || 0;
    let children = parseInt(document.getElementById("children").value) || 0;

    let total = adults + children;

    if (total > maxGuests) {
        alert("Total guests cannot exceed " + maxGuests);
        document.getElementById("children").value = 0;
        total = adults;
    }

    document.getElementById("total").value = total;
}

document.querySelector('[name="adults"]').addEventListener("input", updateTotal);
document.querySelector('[name="children"]').addEventListener("input", updateTotal);
</script>

</body>
</html>
{% comment %} <label>First Name</label><br>
<input type="text" required><br><br>

<label>Last Name</label><br>
<input type="text" required><br><br>

<label>Phone</label><br>
<input type="text" required><br><br>

<label>Email</label><br>
<input type="email" required><br><br>

<button type="submit">Confirm Booking</button>

</form> {% endcomment %}
